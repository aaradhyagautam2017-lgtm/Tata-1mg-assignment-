<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>03a · Upload &amp; name — empty</title>
<link rel="stylesheet" href="../shared/tokens-lofi.css">
<link rel="stylesheet" href="../shared/device.css">
<link rel="stylesheet" href="../shared/upload.css">
</head>
<body>
<div class="device">
<div class="screen upl screen--shell">

  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="cluster"><i class="sig"></i><i class="wifi"></i><i class="batt"></i></span>
  </div>

  <div class="topbar">
    <div class="cc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></div>
  </div>

  <div class="body">
    <h1 class="h1">Who are we meeting?</h1>
    <p class="sub">A photo, a name, and we’re set.</p>

    <!-- centered, larger placeholder — the single active target -->
    <div class="stage">
      <div class="ph">
        <div class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="cap">Add photo</div>
      </div>
    </div>

    <div class="fields">
      <div class="field">
        <label class="flabel">Their name</label>
        <div class="input ph-text">e.g. Mike</div>
      </div>
      <div class="field">
        <label class="flabel">Their breed</label>
        <div class="input ph-text">e.g. Labrador</div>
      </div>
      <p class="helper">Indie and mixed are perfect answers.</p>
    </div>

    <div style="height:20px"></div>
  </div>

  <div class="footer">
    <button class="cta cta--off">Continue</button>
    <p class="privacy">Your photo is used to personalise your rewards. Nothing is shared.</p>
  </div>

</div>
</div>
</body>
</html>
