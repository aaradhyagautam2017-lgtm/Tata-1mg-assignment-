<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>03a-i · Photo source — bottom sheet</title>
<link rel="stylesheet" href="../shared/tokens-lofi.css">
<link rel="stylesheet" href="../shared/device.css">
<link rel="stylesheet" href="../shared/upload.css">
</head>
<body>
<div class="device">
<div class="screen upl screen--shell">

  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="cluster"><i class="sig"></i><i class="wifi"></i><i class="batt"></i></span>
  </div>

  <!-- ===== 03a behind, dimmed ===== -->
  <div class="topbar">
    <div class="cc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></div>
  </div>

  <div class="body">
    <h1 class="h1">Who are we meeting?</h1>
    <p class="sub">A photo, a name, and we’re set.</p>
    <div class="stage">
      <div class="ph">
        <div class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="cap">Add photo</div>
      </div>
    </div>
  </div>

  <!-- ===== bottom sheet: only appears after tapping the placeholder ===== -->
  <div class="scrim"></div>
  <div class="sheet">
    <div class="grabber"></div>
    <div class="sheet-h">Add your pet’s photo</div>
    <div class="sheet-sub">Clear, well-lit and facing the camera works best.</div>

    <div class="strip-label">Recent</div>
    <div class="recents">
      <div class="thumb"></div>
      <div class="thumb"></div>
      <div class="thumb"></div>
      <div class="thumb"></div>
      <div class="thumb peek"></div>
    </div>

    <div class="actions">
      <div class="row">
        <div class="row-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5A1.5 1.5 0 0 1 4.5 7H7l1.1-1.7A1 1 0 0 1 9 4.8h6a1 1 0 0 1 .8.4L17 7h2.5A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5z"/><circle cx="12" cy="12.8" r="3.2"/></svg></div>
        <div class="row-txt"><div class="row-t">Take a photo</div><div class="row-s">Opens the camera</div></div>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
      <div class="row">
        <div class="row-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><circle cx="8.5" cy="10" r="1.6"/><path d="M21 16l-5-5-8 8"/></svg></div>
        <div class="row-txt"><div class="row-t">Choose from gallery</div><div class="row-s">Browse all your photos</div></div>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
    </div>

    <div class="trust">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      Only the photo you pick is shared.
    </div>
  </div>

</div>
</div>
</body>
</html>
