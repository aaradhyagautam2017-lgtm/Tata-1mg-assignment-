<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>02 · Campaign landing — Paw Parade</title>
<link rel="stylesheet" href="../shared/tokens-lofi.css">
<link rel="stylesheet" href="../shared/device.css">
<style>
  /* ==========================================================
     "Paw Parade" concept — structural pass.
     Everything inside .hero-export ships as ONE exported image
     later (headline, subhead, gift-box illustration, confetti,
     background). We only build the two live elements below it:
     the reward-pack card and the CTA + trust line.
     ========================================================== */
  .hero-export {
    margin: 0 0 16px;
    min-height: 440px;
    border: var(--dash);
    border-radius: 0 0 28px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 0 34px;
    gap: 8px;
  }
  .hero-export .tag { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); }

  /* ---------- reward pack card (LIVE) ---------- */
  .reward-pack {
    margin: 0 20px 18px;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: var(--r-card);
    padding: 16px;
  }
  .rp-head { display: flex; gap: 12px; align-items: center; }
  .rp-icon {
    width: 34px; height: 34px; flex: none; border-radius: 10px;
    background: var(--fill); display: grid; place-items: center;
  }
  .rp-icon svg { width: 17px; height: 17px; color: var(--ink-2); }
  .rp-title { font-size: 14.5px; font-weight: 700; }
  .rp-sub { font-size: 11.5px; color: var(--ink-2); margin-top: 2px; }

  .rp-slots { display: flex; margin-top: 18px; }
  .rp-slot {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 6px; position: relative;
  }
  .rp-slot + .rp-slot::before {
    content: ""; position: absolute; left: 0; top: 4px; bottom: 4px; width: 1px;
    background: var(--line);
  }
  .rp-q {
    width: 48px; height: 48px; border-radius: 50%;
    border: var(--dash);
    display: grid; place-items: center;
    font-size: 17px; font-weight: 700; color: var(--ink-3);
  }
  .rp-cap { font-size: 10px; color: var(--ink-3); }

  /* ---------- CTA + trust line (LIVE) ---------- */
  .cta-block { margin: 22px 20px 0; }
  .cta-icon { display: inline-flex; vertical-align: -3px; margin-right: 6px; }
  .cta-icon svg { width: 16px; height: 16px; }
  .trust-line {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 11.5px; color: var(--ink-3); margin-top: 10px;
  }
  .trust-line svg { width: 12px; height: 12px; flex: none; }
</style>
</head>
<body>
<div class="device">
<div class="screen screen--shell">

  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="cluster"><i class="sig"></i><i class="wifi"></i><i class="batt"></i></span>
  </div>

  <!-- chrome: single back control only -->
  <div class="chrome">
    <div class="chrome-circle">←</div>
  </div>

  <div class="scroll">

    <!-- exported-image placeholder: real art drops in at hi-fi -->
    <div class="hero-export">
      <div class="tag">Visuals will come here</div>
    </div>

    <!-- LIVE · reward pack card, 3 mystery slots -->
    <div class="reward-pack">
      <div class="rp-head">
        <div class="rp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M3 8h18M12 8v13M8 8a2.5 2.5 0 0 1 0-5c1.8 0 3 2 4 5M16 8a2.5 2.5 0 0 0 0-5c-1.8 0-3 2-4 5"/></svg></div>
        <div>
          <div class="rp-title">Your reward pack includes</div>
          <div class="rp-sub">Exciting offers for your furry friend</div>
        </div>
      </div>
      <div class="rp-slots">
        <div class="rp-slot"><div class="rp-q">?</div></div>
        <div class="rp-slot"><div class="rp-q">?</div></div>
        <div class="rp-slot"><div class="rp-q">?</div></div>
      </div>
    </div>

    <!-- LIVE · CTA sits directly under the card, not pinned to the
         screen edge — matches the reference's tight composition. -->
    <div class="cta-block">
      <button class="btn btn--primary">
        <span class="cta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 21h14"/></svg></span>
        Upload your pet's photo
      </button>
      <div class="trust-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
        Only you can see your photo
      </div>
    </div>

    <div style="height:20px"></div>
  </div>

  <div class="home-indicator"></div>

</div>
</div>
</body>
</html>
