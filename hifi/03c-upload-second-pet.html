<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>03c · Upload &amp; name — second pet (hi-fi)</title>
<link rel="stylesheet" href="../shared/tokens-hifi.css">
<link rel="stylesheet" href="../shared/device.css">
<link rel="stylesheet" href="../shared/loader.css">
<link rel="stylesheet" href="../shared/upload-hifi.css">
<style>
  .upl2 .roster { margin-top: 20px; }
  .upl2 .stage  { margin-top: 20px; }
  .upl2 .fields { margin-top: 22px; }
</style>
</head>
<body>
<div class="device">
<div class="screen upl2">

  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="cluster"><i class="sig"></i><i class="wifi"></i><i class="batt"></i></span>
  </div>

  <div class="topbar">
    <a class="cc" href="03b-upload-filled.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></a>
  </div>

  <div class="body">
    <h1 class="h1">Who else lives with you?</h1>
    <p class="sub">Same again — a photo, a name, a breed.</p>

    <div class="roster">
      <div class="roster-label">Your pets</div>
      <div class="roster-row">
        <div class="rcell">
          <div class="rcard"><div class="photo-fill"><img src="assets/mike labra.jpg" alt="Mike, a Labrador"></div><div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-10"/></svg></div></div>
          <div class="rname">Mike</div>
        </div>
      </div>
    </div>

    <div class="stage">
      <a class="ph" href="04-meet.html">
        <div class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="cap">Add photo</div>
      </a>
    </div>

    <div class="fields">
      <div class="field">
        <label class="flabel">Their name</label>
        <div class="input ph-text">e.g. Meesha</div>
      </div>
      <div class="field">
        <label class="flabel">Their breed</label>
        <div class="input ph-text">e.g. Indie cat</div>
      </div>
      <p class="helper">Indie and mixed are perfect answers.</p>
    </div>
  </div>

  <div class="footer">
    <a class="btn btn--pink" href="04-meet.html">Continue</a>
    <a class="btn btn--ghost" href="04-meet.html">That's everyone</a>
  </div>

</div>
</div>
<script src="../shared/loader.js" defer></script>
</body>
</html>
