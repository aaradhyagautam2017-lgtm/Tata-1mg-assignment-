<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>02 · Campaign landing — Paw Parade (hi-fi)</title>
<link rel="stylesheet" href="../shared/tokens-hifi.css">
<link rel="stylesheet" href="../shared/device.css">
<link rel="stylesheet" href="../shared/loader.css">
<style>
  /* Full-bleed generated background (02-bg.png, same 390:844 ratio as the
     device) covers the ENTIRE screen — not a bounded card like screen 01.
     The reward-pack card + CTA are a LIVE overlay sitting where the image
     itself fades to a lighter tone near the bottom. */
  .s02b { position: relative; background: #F5EEFC; }
  .s02b .bg-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }
  .s02b > * { position: relative; z-index: 1; }

  .s02b .statusbar .time { color: var(--ink-max); }
  .s02b .statusbar .cluster i { background: var(--ink-max); }

  .s02b .chrome { display: flex; align-items: center; padding: 8px 18px 4px; }
  .s02b .cc {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,.9);
    box-shadow: var(--shadow-sm);
    display: grid; place-items: center; color: var(--ink);
  }
  .s02b .cc svg { width: 17px; height: 17px; }

  /* flexible spacer — pushes the card block down to sit over the
     image's faded lower region, regardless of exact image height */
  .s02b .spacer { flex: 1; }

  /* ---------- reward pack card ---------- */
  .s02b .reward-pack {
    margin: 0 20px 14px;
    background: #FBF8FE;
    border-radius: 22px;
    padding: 18px;
    box-shadow: 0 14px 32px rgba(90,40,140,.18);
  }
  .s02b .rp-head { display: flex; gap: 12px; align-items: center; }
  .s02b .rp-icon {
    width: 38px; height: 38px; flex: none; border-radius: 50%;
    background: var(--purple); color: #fff;
    display: grid; place-items: center;
  }
  .s02b .rp-icon svg { width: 19px; height: 19px; }
  .s02b .rp-title { font-size: 15px; font-weight: 800; color: var(--purple-deep); }
  .s02b .rp-sub { font-size: 12px; color: var(--grey-1); margin-top: 2px; }

  .s02b .rp-slots { display: flex; margin-top: 16px; }
  .s02b .rp-slot {
    flex: 1; display: flex; justify-content: center; position: relative;
  }
  .s02b .rp-slot + .rp-slot::before {
    content: ""; position: absolute; left: 0; top: 4px; bottom: 4px; width: 1px;
    background: #E3D3F5;
  }
  .s02b .rp-q {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px dashed #C79EEB;
    display: grid; place-items: center;
    font-size: 18px; font-weight: 800; color: var(--purple);
  }

  /* ---------- CTA + trust line ---------- */
  .s02b .cta-block { margin: 0 20px; padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  .s02b .cta-icon { display: inline-flex; vertical-align: -3px; margin-right: 7px; }
  .s02b .cta-icon svg { width: 16px; height: 16px; }
  .s02b .trust-line {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 11.5px; color: var(--grey-1); margin-top: 10px;
  }
  .s02b .trust-line svg { width: 13px; height: 13px; flex: none; }
</style>
</head>
<body>
<div class="device">
<div class="screen s02b">

  <img class="bg-img" src="assets/02-bg.png" alt="Paw Parade — a purple gift box with a puppy peeking out, surrounded by confetti">

  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="cluster"><i class="sig"></i><i class="wifi"></i><i class="batt"></i></span>
  </div>

  <div class="chrome">
    <a class="cc" href="01-entry.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></a>
  </div>

  <div class="spacer"></div>

  <!-- LIVE · reward pack card -->
  <div class="reward-pack">
    <div class="rp-head">
      <div class="rp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M3 8h18M12 8v13M8 8a2.5 2.5 0 0 1 0-5c1.8 0 3 2 4 5M16 8a2.5 2.5 0 0 0 0-5c-1.8 0-3 2-4 5"/></svg></div>
      <div>
        <div class="rp-title">Your reward pack includes</div>
        <div class="rp-sub">Exciting offers for your furry friend</div>
      </div>
    </div>
    <div class="rp-slots">
      <div class="rp-slot"><div class="rp-q">?</div></div>
      <div class="rp-slot"><div class="rp-q">?</div></div>
      <div class="rp-slot"><div class="rp-q">?</div></div>
    </div>
  </div>

  <!-- LIVE · CTA + trust line -->
  <div class="cta-block">
    <a class="btn btn--pink" href="03a-upload-empty.html">
      <span class="cta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 21h14"/></svg></span>
      Upload your pet's photo
    </a>
    <div class="trust-line">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      Only you can see your photo
    </div>
  </div>

</div>
</div>
<script src="../shared/loader.js" defer></script>
</body>
</html>
